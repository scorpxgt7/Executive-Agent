global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'executive-agent'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'

  - job_name: 'temporal'
    static_configs:
      - targets: ['temporal:7233']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'